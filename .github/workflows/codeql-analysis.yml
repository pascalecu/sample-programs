name: "CodeQL"

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main]
    paths: &code_paths
      - ".github/workflows/*.yml"
      - "scripts/*.py"
      - "archive/c/c/*.c"
      - "archive/c/c/testinfo.yml"
      - "archive/c/c-plus-plus/*.cpp"
      - "archive/c/c-plus-plus/testinfo.yml"
      - "archive/c/c-sharp/*.cs"
      - "archive/c/c-sharp/testinfo.yml"
      - "archive/g/go/*.go"
      - "archive/g/go/testinfo.yml"
      - "archive/j/java/*.java"
      - "archive/j/java/testinfo.yml"
      - "archive/j/javascript/*.js"
      - "archive/j/javascript/testinfo.yml"
      - "archive/k/kotlin/*.kt"
      - "archive/k/kotlin/testinfo.yml"
      - "archive/p/python/*.py"
      - "archive/p/python/testinfo.yml"
      - "archive/r/ruby/*.rb"
      - "archive/r/ruby/testinfo.yml"
      - "archive/r/rust/*.rs"
      - "archive/r/rust/testinfo.yml"
      - "archive/s/swift/*.swift"
      - "archive/s/swift/testinfo.yml"
      - "archive/t/typescript/*.ts"
      - "archive/t/typescript/testinfo.yml"

  pull_request:
    branches: [main]
    paths: *code_paths

  schedule:
    # Run every Saturday at 4:53 UTC (randomly chosen)
    - cron: "53 4 * * 6"

jobs:
  # We need this job to check if changed files should trigger analysis
  changed-files:
    name: Detect Changes
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.has_changes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Get changed files
        id: diff
        uses: yumemi-inc/changed-files@v3

      - name: Build CodeQL matrix
        id: matrix
        env:
          CHANGED_FILES: ${{ steps.diff.outputs.files }}
        run: |
          RESULT=$(python3 scripts/get_codeql_languages.py \
            --event "${{ github.event_name }}" \
            ${{ steps.diff.outputs.files }})

          if [ -z "$RESULT" ] || [ "$RESULT" = "[]" ]; then
            echo "matrix={\"include\": []}" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "matrix={\"include\": $RESULT}" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  analyze:
    name: Analyze (${{ matrix.language }})
    needs: changed-files
    if: needs.changed-files.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changed-files.outputs.matrix) }}

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Load repo config
        id: config
        uses: pietrobolcato/action-read-yaml@1.1.0
        with:
          config: repo-config.yml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.config.outputs['python-version'] }}
          cache: "poetry"

      - name: Setup Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ steps.config.outputs['poetry-version'] }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Setup Kotlin
        if: matrix.language == 'kotlin'
        run: |
          if ! command -v kotlinc &> /dev/null; then
            sudo snap install kotlin --classic --channel=2.2/stable
          fi

      - name: Setup Rust
        if: matrix.language == 'rust'
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          python3 scripts/generate_cargo_toml.py

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode != 'manual'
        uses: github/codeql-action/autobuild@v4

      - name: Manual build
        if: matrix.build-mode == 'manual'
        run: |
          poetry run python scripts/build_codeql_language.py \
            "${{ matrix.language }}" \
            "${{ matrix.paths }}"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
