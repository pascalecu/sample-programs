name: Pull Request Labeler

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  labeler:
    name: Apply PR Labels

    permissions:
      contents: read
      pull-requests: write
      issues: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Load repo config
        id: config
        uses: pietrobolcato/action-read-yaml@1.1.0
        with:
          config: repo-config.yml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "${{ steps.config.outputs['python-version'] }}"

      - name: Setup Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: "${{ steps.config.outputs['poetry-version'] }}"

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Generate label configuration
        run: poetry run python scripts/set_up_labeler.py

      - name: Validate label config
        run: test -f .github/labeler.yml

      - name: Apply labels
        uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          sync-labels: true
