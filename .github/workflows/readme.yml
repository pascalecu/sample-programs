# This workflow generates READMEs for all languages

name: Ronbun

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
    paths:
      - "archive/**"
      - ".glotter.yml"
      - "repo-config.yml"
      - ".github/workflows/readme.yml"
      - "pyproject.toml"
      - "poetry.lock"

jobs:
  readme:
    name: Generate READMEs
    runs-on: ubuntu-latest
    # Prevent concurrent runs from clobbering the same branch
    concurrency:
      group: readme-gen-${{ github.ref }}
      cancel-in-progress: true

    steps:
      # Auth
      - name: Generate GitHub app token
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.README_BOT_APP_ID }}
          private-key: ${{ secrets.README_BOT_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ steps.token.outputs.token }}

      # Config
      - name: Load repo config
        id: config
        uses: pietrobolcato/action-read-yaml@1.1.0
        with:
          config: repo-config.yml

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.config.outputs['python-version'] }}
          cache: 'poetry'

      - name: Setup Poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: ${{ steps.config.outputs['poetry-version'] }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # Generate docs
      - name: Generate READMEs
        run: poetry run ronbun . --log=INFO

      # Create PR
      - name: Create pull request
        id: pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Regenerated READMEs
          author:
            github-actions[bot]
            <41898282+github-actions[bot]@users.noreply.github.com>
          branch: readme-generation
          delete-branch: true
          title: "[Automated Workflow] Add/Modify READMEs"
          labels: enhancement
          token: ${{ steps.token.outputs.token }}

      - name: Enable PR automerge
        if: steps.pr.outputs.pull-request-operation == 'created'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          pull-request-number: ${{ steps.pr.outputs.pull-request-number }}
          merge-method: squash
          token: ${{ steps.token.outputs.token }}
